<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02_svg_ui.html</title>
    <link rel="stylesheet" href="../../../etc/reset.css" />
    <link rel="stylesheet" href="02_svg_ui.css" />
    <script src="02_svg_ui.js" defer></script>
  </head>

  <body>
    <ul class="card_list">
      <li class="card hidden">
        <a href="../../img/img1.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img1.jpg" type="image/jpeg" />
            <img src="../../img/img1.jpg" alt="귀여운 유명한 고양이 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Cute Cat</strong>
            <span>A cute and fluffy cat with big eyes and a playful expression.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img2.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img2.jpg" type="image/jpeg" />
            <img src="../../img/img2.jpg" alt="네이버 처음으로 뜨는 강아지 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Dog</strong>
            <span>A cute and loyal dog with a friendly demeanor and alert expression.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img3.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img3.jpg" type="image/jpeg" />
            <img src="../../img/img3.jpg" alt="토끼 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Rabbit</strong>
            <span>White small rabbit with small ears.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img4.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img4.jpg" type="image/jpeg" />
            <img src="../../img/img4.jpg" alt="상어 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Shark</strong>
            <span>A fierce and powerful shark swimming in the ocean.</span>
          </p>
        </a>
      </li>
    </ul>
    <!-- svg path loading UI -->
    <div class="svg_loader" style="display: none">
      <svg viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" />
      </svg>
    </div>
    <!-- svg animate loading UI -->
    <div class="svg_loader2" style="display: none">
      <svg width="100%" height="100%" viewBox="0 0 160 40">
        <circle cx="20" cy="20" r="15" fill="#3478f6">
          <animate attributeName="cx" from="20" to="80" dur="0.5s" calcMode="spline" keySplines="0.45 0.7 0.80 1" keyTimes="0;1" repeatCount="indefinite" />
        </circle>
        <circle cx="20" cy="20" r="0" fill="#34f6a4">
          <animate attributeName="r" from="0" to="15" dur="0.5s" calcMode="spline" keySplines="0.45 0.7 0.80 1" keyTimes="0;1" repeatCount="indefinite" />
        </circle>
        <circle cx="80" cy="20" r="15" fill="#f63478">
          <animate attributeName="cx" from="80" to="140" dur="0.5s" calcMode="spline" keySplines="0.45 0.7 0.80 1" keyTimes="0;1" repeatCount="indefinite" />
        </circle>
        <circle cx="140" cy="20" r="15" fill="#f6a434">
          <animate attributeName="r" from="15" to="0" dur="0.5s" calcMode="spline" keySplines="0.45 0.7 0.80 1" keyTimes="0;1" repeatCount="indefinite" />
        </circle>
      </svg>
    </div>
  </body>
</html>
