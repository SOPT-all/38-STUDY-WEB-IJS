<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>03_skeleton_ui.html</title>
    <link rel="stylesheet" href="../../../etc/reset.css" />
    <link rel="stylesheet" href="03_skeleton_ui.css" />
    <script src="03_skeleton_ui.js" defer></script>
  </head>

  <body>
    <ul class="card_list">
      <li class="card hidden">
        <a href="../../img/img1.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img1.jpg" type="image/jpeg" />
            <img src="../../img/img1.jpg" alt="사람이 붓을 들고 그림을 구상하고 있는 AI 달리가 생성한 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Cute Cat</strong>
            <span>A cute and fluffy cat with big eyes and a playful expression.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img2.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img2.jpg" type="image/jpeg" />
            <img src="../../img/img2.jpg" alt="옅은 미소를 짓고 웃고있는 AI 달리가 생성한 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Dog</strong>
            <span>A cute and loyal dog with a friendly demeanor and alert expression.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img3.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img3.jpg" type="image/jpeg" />
            <img src="../../img/img3.jpg" alt="즐거운 사람들이 거리에서 비를 맞으며 춤을 추고 노래를 하고 있는 AI 달리가 생성한 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Rabbit</strong>
            <span>White small rabbit with small ears.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img4.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img4.jpg" type="image/jpeg" />
            <img src="../../img/img4.jpg" alt="사람이 창밖을 보고 있는 그림을 그리는 붓이 보이는 AI 달리가 생성한 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Shark</strong>
            <span>A fierce and powerful shark swimming in the ocean.</span>
          </p>
        </a>
      </li>
    </ul>
    <!-- Skeleton UI -->
    <div class="card skeleton" style="display: none">
      <div class="image"></div>
      <div class="card_desc">
        <strong class="title"></strong>
        <span class="description"></span>
      </div>
    </div>
  </body>
</html>
