<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01_spinner_ui.html</title>
    <link rel="stylesheet" href="01_spinner_ui.css" />
    <link rel="stylesheet" href="../../../etc/reset.css" />
    <script src="01_spinner_ui.js" defer></script>
  </head>

  <body>
    <ul class="card_list">
      <li class="card hidden">
        <a href="../../img/img1.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <!-- webp 파일을 넣었어야하나, 파일이 없어서 넣지는 못함! -->
            <source srcset="../../img/img1.jpg" type="image/jpeg" />
            <img src="../../img/img1.jpg" alt="귀여운 유명한 고양이 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Cute Cat</strong>
            <span>A cute and fluffy cat with big eyes and a playful expression.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img2.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img2.jpg" type="image/jpeg" />
            <img src="../../img/img2.jpg" alt="네이버 처음으로 뜨는 강아지 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Dog</strong>
            <span>A cute and loyal dog with a friendly demeanor and alert expression.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img3.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img3.jpg" type="image/jpeg" />
            <img src="../../img/img3.jpg" alt="토끼 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Rabbit</strong>
            <span>White small rabbit with small ears.</span>
          </p>
        </a>
      </li>
      <li class="card hidden">
        <a href="../../img/img4.jpg" target="_blank" rel="noreferrer noopener">
          <picture>
            <source srcset="../../img/img4.jpg" type="image/jpeg" />
            <img src="../../img/img4.jpg" alt="상어 이미지" />
          </picture>
          <p class="card_desc">
            <strong>Shark</strong>
            <span>A fierce and powerful shark swimming in the ocean.</span>
          </p>
        </a>
      </li>
    </ul>
    <!-- spinner -->
    <div class="spinner" style="display: none"></div>
  </body>
</html>
