<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="02_keyboard.css">
    <script src="02_keyboard.js" defer></script>
</head>

<body>
    <main class="main">
        <h1>Keyboard Event</h1>
        <p class="info js-info"> -</p>
        <article class="keyboard" data-type="keydown">
            <h2>KeyDown</h2>
            <div class="key_container">
                <!-- <button type="button" data-key="q">Q</button>
                        <button type="button" data-key="w">W</button>
                        <button type="button" data-key="e">E</button>
                        <button type="button" data-key="r">R</button> -->

            </div>
            <!-- button 요소 동적 추가 -->
        </article>
        <article class="keyboard" data-type="keypress">
            <h2>KeyPress</h2>
            <div class="key_container">
                <!-- button 요소 동적 추가 -->
            </div>
        </article>
        <article class="keyboard" data-type="keyup">
            <h2>KeyUp</h2>
            <div class="key_container">
                <!-- button 요소 동적 추가 -->
            </div>
        </article>
        <button type="button" class="btn_refresh js-refresh">새로고침</button>
    </main>
</body>

</html>
